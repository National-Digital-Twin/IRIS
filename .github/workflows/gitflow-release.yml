name: Release on New Release Branch

on:
  push:
    branches:
      - "release/*"

jobs:
  versioning:
    name: Extract Version
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: read
      statuses: write
    env:
      RELEASE_REF: ${{ github.ref }}
    outputs:
      version: ${{ steps.extract_version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0 # Ensure full history for tagging

      - name: Extract version from branch name
        id: extract_version
        run: |
          VERSION=$(echo "${RELEASE_REF#refs/heads/release/}")
          # Replace hyphens with dots if needed
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION=$(echo "$VERSION" | tr '-' '.')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate Version Format (Semantic Versioning)
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format! Expected x.y.z (e.g., 1.2.3)"
            exit 1
          fi

      - name: Print Extracted Version
        run: |
          echo "Tag Version: $VERSION"
          echo "Branch Name: $RELEASE_REF"

      - name: Print docker image tag Version
        env:
          EXTRACTED_VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          echo "Generated Version: $EXTRACTED_VERSION"

  api-ci:
    needs: [versioning]
    permissions:
      id-token: write
      contents: write
      packages: read
      statuses: write
    uses: ./.github/workflows/backend-ci-pr.yml
    secrets:
      GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}

  frontend-ci:
    needs: [versioning]
    permissions:
      id-token: write
      contents: write
      packages: read
      statuses: write
    uses: ./.github/workflows/frontend-ci-pr.yml

  proxy-ci:
    needs: [versioning]
    permissions:
      id-token: write
      contents: write
      packages: read
      statuses: write
    uses: ./.github/workflows/transparent-proxy-ci-pr.yml

  api-push-to-ECR:
    needs: [api-ci, versioning]
    permissions:
      id-token: write
      contents: write
      packages: read
      statuses: write
    uses: ./.github/workflows/backend-cd-push-to-ECR.yml
    with:
      aws_account_number: "${{ vars.STAGING_AWS_ACCOUNT_ID }}"
      repo_name: iris/api
      app_name: iris/api
      version: ${{ needs.versioning.outputs.version }}
    secrets:
      GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}

  frontend-push-to-ECR:
    needs: [frontend-ci, versioning]
    permissions:
      id-token: write
      contents: write
      packages: read
      statuses: write
    uses: ./.github/workflows/frontend-cd-push-to-ECR.yml
    with:
      aws_account_number: "${{ vars.STAGING_AWS_ACCOUNT_ID }}"
      repo_name: "iris/visualiser"
      app_name: "iris/visualiser"
      version: ${{ needs.versioning.outputs.version }}

  proxy-push-to-ECR:
    needs: [proxy-ci, versioning]
    permissions:
      id-token: write
      contents: write
      packages: read
      statuses: write
    uses: ./.github/workflows/transparent-proxy-cd-push-to-ECR.yml
    with:
      aws_account_number: "${{ vars.STAGING_AWS_ACCOUNT_ID }}"
      repo_name: "iris/transparent-proxy"
      app_name: "transparent-proxy"
      version: ${{ needs.versioning.outputs.version }}
