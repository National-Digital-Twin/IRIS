name: Frontend CD on PR merge

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      major:
        description: "Major version (default: 1)"
        required: false
        default: "1"
        type: string
      minor:
        description: "Minor version (default: 0)"
        required: false
        default: "0"
        type: string

permissions:
  id-token: write
  contents: read
  packages: read
  statuses: write

jobs:
  versioning:
    name: Semantic Versioning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.generate-version.outputs.version }}
    steps:
      - name: Generate Patch Version (Timestamp)
        id: generate-patch
        run: |
          PATCH=$(date -u +"%Y%m%d%H%M%S")
          echo "patch_version=${PATCH}" >> $GITHUB_ENV

      - name: Generate Full Semantic Version
        id: generate-version
        env:
          MAJOR_INPUT: ${{ github.event.inputs.major }}
          MINOR_INPUT: ${{ github.event.inputs.minor }}
          PATCH_VERSION: ${{ env.patch_version }}
        run: |
          MAJOR="${MAJOR_INPUT:-1}"
          MINOR="${MINOR_INPUT:-0}"
          PATCH="${PATCH_VERSION}"

          if [[ ! "$MAJOR" =~ ^[0-9]+$ ]]; then
            echo "Error: Invalid major version input."
            exit 1
          fi

          if [[ ! "$MINOR" =~ ^[0-9]+$ ]]; then
            echo "Error: Invalid minor version input."
            exit 1
          fi

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Print Generated Version
        env:
          GENERATED_VERSION: ${{ steps.generate-version.outputs.version }}
        run: |
          echo "Generated Version: $GENERATED_VERSION"

  frontend-ci:
    needs: [versioning]
    uses: ./.github/workflows/frontend-ci-pr.yml

  push-to-ECR:
    needs: [frontend-ci, versioning]
    uses: ./.github/workflows/frontend-cd-push-to-ECR.yml
    with:
      aws_account_number: "${{ vars.DEV_AWS_ACCOUNT_ID }}"
      repo_name: "iris/visualiser"
      app_name: "iris/visualiser"
      version: ${{ needs.versioning.outputs.version }}
