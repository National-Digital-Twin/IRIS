apiVersion: batch/v1
kind: Job
metadata:
  name: iris-s3-csv-postgres-importer-job
  namespace: iris
spec:
  template:
    spec:
      serviceAccountName: s3-csv-postgres-importer-sa
      automountServiceAccountToken: false
      containers:
        - name: csv-postgres-importer
          image: 537124944113.dkr.ecr.eu-west-2.amazonaws.com/iris/s3-csv-postgres-importer:1.0.0
          env:
            - name: AWS_ROLE_ARN
              value: arn:aws:iam::537124944113:role/s3-csv-postgres-importer-role
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "/var/run/secrets/eks.amazonaws.com/serviceaccount/token"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: s3-csv-postgres-importer-config-map
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: s3-csv-postgres-importer-config-map
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: s3-csv-postgres-importer-config-map
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: s3-csv-postgres-importer-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: s3-csv-postgres-importer-secrets
                  key: DB_PASSWORD
            - name: S3_FILE_URI
              value: REPLACE_ME
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: s3-csv-postgres-importer-config-map
                  key: AWS_REGION
            - name: TARGET_TABLE
              value: REPLACE_ME
          command: ["sh", "-c"]
          args:
            - |
              # Wait for PostgreSQL to be ready
              while ! pg_isready -h ${DB_HOST} -p ${DB_PORT}; do
                echo "Waiting for database connection..."
                sleep 2
              done

              # Download CSV from S3
              aws s3 cp ${S3_FILE_URI} /tmp/data.csv --region ${AWS_REGION}

              # Verify download
              if [ $? -ne 0 ]; then
                echo "Failed to download CSV from S3"
                exit 1
              fi

              # Import CSV data
              PGPASSWORD=${DB_PASSWORD} psql \
                -h ${DB_HOST} \
                -p ${DB_PORT} \
                -U ${DB_USERNAME} \
                -d ${DB_NAME} \
                -c "\copy ${TARGET_TABLE} FROM '/tmp/data.csv' WITH(FORMAT csv, DELIMITER '|', HEADER, QUOTE '\"', ESCAPE '''');"

              # Verify import
              echo "Verifying data import..."

              PGPASSWORD=${DB_PASSWORD} psql \
                -h ${DB_HOST} \
                -p ${DB_PORT} \
                -U ${DB_USERNAME} \
                -d ${DB_NAME} \
                -t -c "SELECT COUNT(*) FROM ${TARGET_TABLE}"

              # Check for errors
              if [ $? -ne 0 ]; then
                echo "CSV import failed!"
                exit 1
              fi

              echo "CSV import completed successfully!"

              echo "Removing the CSV file after import..."

              # Check for errors
              if [ $? -ne 0 ]; then
                echo "Failed to remove CSV file!"
                exit 1
              fi

              echo "Successfully removed the CSV file!"
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 999
  backoffLimit: 4
