services:
  zookeeper:
    container_name: iris-pipeline-zookeeper
    image: bitnami/zookeeper:latest
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
  kafka:
    container_name: iris-pipeline-kafka
    image: "bitnami/kafka:3.5.1"
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - ./kafka/server.properties:/bitnami/kafka/config/server.properties
      - ./kafka/producer.properties:/bitnami/kafka/config/producer.properties
      - ./kafka/consumer.properties:/bitnami/kafka/config/consumer.properties
    environment:
      - BITNAMI_DEBUG=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
  secure-agent-graph:
    container_name: iris-pipeline-sag
    environment:
      JAVA_OPTIONS: "-XX:MaxRAMPercentage=80.0"
      JWKS_URL: "disabled"
    command:
      - --config
      - /fuseki/config/config.ttl
    image: iris-pipeline/secure-agent-graph
    depends_on:
      - kafka
    ports:
      - 3030:3030
    extra_hosts:
      - "host.docker.internal:host-gateway"
  minio:
    image: minio/minio
    container_name: airflow-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "--console-address", ":9001", "/data"]

volumes:
  minio-data:
