<div class="widget-header">
    <div class="widget-title">
        Percentage of buildings with
        <mat-form-field appearance="outline" class="inline-select">
            <mat-select [value]="selectedCharacteristic()" (selectionChange)="onCharacteristicChange($event.value)">
                @for (option of characteristicOptions; track option.value) {
                    <mat-option [value]="option.value">{{ option.label }}</mat-option>
                }
            </mat-select>
        </mat-form-field>
        per
        <c477-region-selector [selectedRegions]="selectedRegions()" (selectedRegionsChange)="onRegionChange($event)"></c477-region-selector>
    </div>
</div>

<div class="chart-wrapper">
    @if (loading()) {
        <div class="chart-skeleton"></div>
    } @else {
        <plotly-plot [data]="chartData()" [layout]="chartLayout" [config]="chartConfig"></plotly-plot>
    }
</div>
