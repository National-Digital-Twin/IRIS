<div class="widget-header">
    <div class="widget-title">
        <span>Percentage of buildings with</span>
        <mat-form-field appearance="outline" class="inline-select">
            <mat-select [value]="selectedCharacteristic() || ''" (selectionChange)="selectedCharacteristic.set($event.value)" [disabled]="loading()">
                @if (loading()) {
                    <mat-option value="" disabled selected>Loading...</mat-option>
                } @else {
                    @for (option of characteristicOptions(); track option) {
                        <mat-option [value]="option">{{ option }}</mat-option>
                    }
                }
            </mat-select>
        </mat-form-field>
        <span>per</span>
        <c477-region-selector
            [selectedRegions]="selectedRegions()"
            [availableRegions]="availableRegions()"
            (selectedRegionsChange)="selectedRegions.set($event)"
        ></c477-region-selector>
    </div>
</div>

<div class="chart-wrapper">
    @if (loading()) {
        <div class="chart-skeleton"></div>
    } @else {
        <plotly-plot [data]="chartData()" [layout]="chartLayout()" [config]="chartConfig"></plotly-plot>
    }
</div>
