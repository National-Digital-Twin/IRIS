<div class="widget-header">
    <div class="widget-title">
        <mat-form-field appearance="outline" class="inline-select">
            <mat-select [value]="selectedBuildingType()" (selectionChange)="selectedBuildingType.set($event.value)">
                @for (type of availableBuildingTypes(); track type) {
                    <mat-option [value]="type">{{ type }}</mat-option>
                }
            </mat-select>
        </mat-form-field>
        <span>fuel types</span>
    </div>
</div>

<div class="chart-wrapper">
    @if (loading()) {
        <div class="chart-skeleton"></div>
    } @else {
        <plotly-plot [data]="chartData()" [layout]="chartLayout()" [config]="chartConfig"></plotly-plot>
    }
</div>
