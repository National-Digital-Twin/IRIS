<mat-toolbar class="toolbar-container">
    <a class="logo" routerLink="/" aria-label="Return to map view">
        <img src="/assets/iris-logo.svg" alt="NDTP Logo" />
        <span>IRIS</span>
    </a>
</mat-toolbar>

<div class="dashboard">
    <header class="dashboard-header">
        <h1>Statistics - {{ dashboardType() === 'national' ? 'National' : 'Area defined' }} view</h1>
        <button mat-raised-button color="primary" (click)="handleReturnToMapView()">
            <mat-icon>arrow_back</mat-icon>
            <span>Return to map view</span>
        </button>
    </header>

    <div class="dashboard-grid">
        <section class="widget-card double-height">
            <c477-overall-epc-chart [selectedArea]="selectedArea()"></c477-overall-epc-chart>
        </section>

        @if (dashboardType() === 'national') {
            <section class="widget-card">
                <c477-epc-region-chart [selectedArea]="selectedArea()"></c477-epc-region-chart>
            </section>
        }

        @if (dashboardType() === 'national') {
            <section class="widget-card">
                <c477-characteristics-chart [selectedArea]="selectedArea()"></c477-characteristics-chart>
            </section>
        }

        @if (dashboardType() === 'area') {
            <section class="widget-card">
                <c477-sap-timeline-chart [selectedArea]="selectedArea()"></c477-sap-timeline-chart>
            </section>
        }
    </div>
</div>
