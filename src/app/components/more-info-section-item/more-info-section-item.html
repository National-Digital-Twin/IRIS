@let header = headerInput();
@let warn = warnInput();
@let subtitle = subtitleInput();
@let warningGuidance = warningGuidanceInput();

<cdk-accordion-item #sectionItem="cdkAccordionItem" class="section-item" [class.is-expanded]="sectionItem.expanded">
    <div class="section-item-container">
        <div (click)="sectionItem.toggle()" class="section-item-header-container">
            <div class="section-item-header">
                <div class="section-item-text">
                    <span [innerHTML]="header"></span>
                    @if (warn) {
                        <mat-icon class="section-item-warning-icon">warning_amber</mat-icon>
                    }
                </div>
                <mat-icon data-testid="section-item-toggle-icon">{{ sectionItem.expanded ? 'arrow_drop_up' : 'arrow_drop_down' }}</mat-icon>
            </div>
            @if (subtitle) {
                <div>
                    <span class="section-item-subtitle">{{ subtitle }}</span>
                </div>
            }
        </div>
        <div class="section-content">
            @if (warn) {
                <div class="section-item-warning-guidance-content" [innerHTML]="warningGuidance"></div>
            }
            <ng-content></ng-content>
        </div>
        <mat-divider class="section-divider"></mat-divider>
    </div>
</cdk-accordion-item>
