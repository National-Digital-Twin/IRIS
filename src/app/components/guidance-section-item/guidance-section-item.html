<c477-more-info-section-item header="Guidance">
    <div class="container">
        <p>To visually see the areas of each weather type, click the 'layers' button on the right-hand side</p>
        <mat-icon>layers</mat-icon>
        <p>
            A property is 'within' an area if it falls inside a square that experiences extreme weather. A property is 'near' an area if any of the 8
            surrounding squares experience extreme weather.
        </p>
    </div>
</c477-more-info-section-item>
