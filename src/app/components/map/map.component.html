@let hasSpatialFilter = spatialFilterEnabled();
@let theme = theme$ | async;

@if (theme) {
    <div class="map-controls top">
        <div class="control-group">
            <button mat-mini-fab class="control" (click)="resetMapView.emit(null)" matTooltip="Reset view">
                <img class="icon" src="assets/icons/home.svg" alt="Reset view" />
            </button>
        </div>
        <div class="control-group">
            <button mat-mini-fab class="control" (click)="resetNorth.emit(null)" matTooltip="Reset to north">
                <img class="icon" src="assets/icons/explore.svg" [style]="'transform: rotate(' + bearing + 'deg)'" alt="Reset to north" />
            </button>
            <button mat-mini-fab class="control text" (click)="changeDimensions()" [matTooltip]="twoDimensions ? 'Tilt the view to 3D' : 'Tilt the view to 2D'">
                @if (!twoDimensions) {
                    2D
                } @else {
                    3D
                }
            </button>
        </div>
        <div class="control-group">
            <button class="control" mat-mini-fab (click)="zoomIn.emit(null)" matTooltip="Zoom in">
                <img class="icon" src="assets/icons/add.svg" alt="Zoom in" />
            </button>
            <button class="control" mat-mini-fab (click)="zoomOut.emit(null)" matTooltip="Zoom out">
                <img class="icon" src="assets/icons/remove.svg" alt="Zoom out" />
            </button>
        </div>
        <div class="control-group">
            <button class="control" mat-mini-fab matTooltip="Draw filter area" [class.active]="drawActive" (click)="setDrawMode('polygon')">
                <img class="icon" [src]="this.drawActive ? 'assets/icons/polyline-white.svg' : 'assets/icons/polyline.svg'" alt="Draw filter area" />
            </button>
            @if (hasSpatialFilter && mapInstance.getZoom() < 15) {
                <button class="control" mat-mini-fab matTooltip="Download addresses" (click)="downloadAddresses.emit(null)">
                    <img class="icon" src="assets/icons/download.svg" alt="Download addresses" />
                </button>
            }
            <button class="control" mat-mini-fab matTooltip="Delete filter area" (click)="setDrawMode('delete')" [disabled]="!hasSpatialFilter">
                @if (hasSpatialFilter) {
                    <img class="icon" src="assets/icons/delete.svg" alt="Delete filter area" />
                } @else {
                    <img class="icon" src="assets/icons/delete-disabled.svg" alt="Delete filter area" />
                }
            </button>
        </div>
        <div class="control-group">
            <button mat-mini-fab class="control" (click)="showLegend = !showLegend" matTooltip="Legend">
                <img class="icon" src="assets/icons/legend-toggle.svg" alt="Legend" />
            </button>
            @if (showLegend) {
                <c477-legend />
            }
        </div>
        <div class="control-group">
            <button mat-mini-fab class="control" [matMenuTriggerFor]="layersMenu" matTooltip="Layers" [class.active]="activeLayersCount > 0">
                <mat-icon>layers</mat-icon>
            </button>
            <mat-menu #layersMenu="matMenu" class="layers-menu" xPosition="before" [overlapTrigger]="false">
                <div>
                    <button mat-menu-item [matMenuTriggerFor]="epcSubmenu">
                        <mat-icon>bar_chart</mat-icon>
                        <span>EPC ratings</span>
                    </button>
                    <mat-menu #epcSubmenu="matMenu" class="layers-submenu" [overlapTrigger]="false" xPosition="before">
                        <button mat-menu-item (click)="toggleEpcLayer('regions')" [class.active]="layerStates.epc.regions">
                            <span>Regions</span>
                        </button>
                        <button mat-menu-item (click)="toggleEpcLayer('counties')" [class.active]="layerStates.epc.counties">
                            <span>Counties</span>
                        </button>
                        <button mat-menu-item (click)="toggleEpcLayer('districts')" [class.active]="layerStates.epc.districts">
                            <span>Districts</span>
                        </button>
                        <button mat-menu-item (click)="toggleEpcLayer('wards')" [class.active]="layerStates.epc.wards">
                            <span>Wards</span>
                        </button>
                    </mat-menu>
                </div>

                <div>
                    <button mat-menu-item [matMenuTriggerFor]="windRainSubmenu">
                        <mat-icon>air</mat-icon>
                        <span>Wind-driven rain</span>
                    </button>
                    <mat-menu #windRainSubmenu="matMenu" class="layers-submenu" [overlapTrigger]="false" xPosition="before">
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('twoDegree0')" [class.active]="layerStates.windDrivenRain.twoDegree0">
                            <span>2°C warming - North</span>
                        </button>
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('twoDegree90')" [class.active]="layerStates.windDrivenRain.twoDegree90">
                            <span>2°C warming - East</span>
                        </button>
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('twoDegree180')" [class.active]="layerStates.windDrivenRain.twoDegree180">
                            <span>2°C warming - South</span>
                        </button>
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('twoDegree270')" [class.active]="layerStates.windDrivenRain.twoDegree270">
                            <span>2°C warming - West</span>
                        </button>
                        <mat-divider></mat-divider>
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('fourDegree0')" [class.active]="layerStates.windDrivenRain.fourDegree0">
                            <span>4°C warming - North</span>
                        </button>
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('fourDegree90')" [class.active]="layerStates.windDrivenRain.fourDegree90">
                            <span>4°C warming - East</span>
                        </button>
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('fourDegree180')" [class.active]="layerStates.windDrivenRain.fourDegree180">
                            <span>4°C warming - South</span>
                        </button>
                        <button mat-menu-item (click)="toggleWindDrivenRainLayer('fourDegree270')" [class.active]="layerStates.windDrivenRain.fourDegree270">
                            <span>4°C warming - West</span>
                        </button>
                    </mat-menu>
                </div>

                <div>
                    <button mat-menu-item (click)="toggleIcingDaysLayer()" [class.active]="layerStates.icingDays">
                        <mat-icon>ac_unit</mat-icon>
                        <span>Icing days</span>
                    </button>
                </div>

                <div>
                    <button mat-menu-item (click)="toggleHotSummerDaysLayer()" [class.active]="layerStates.hotSummerDays">
                        <mat-icon>thermostat</mat-icon>
                        <span>Hot summer days (30°C+)</span>
                    </button>
                </div>
            </mat-menu>
        </div>
    </div>
    <div class="map-controls bottom">
        <div class="control-group">
            <button mat-mini-fab class="control" (click)="toggleMinimap.emit(null)" matTooltip="Minimap">
                <img class="icon" src="assets/icons/map.svg" alt="Minimap" />
            </button>
        </div>
    </div>
}
<div id="map" class="map"></div>
