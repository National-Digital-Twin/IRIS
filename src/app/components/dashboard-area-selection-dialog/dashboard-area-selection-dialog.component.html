<h2 mat-dialog-title>Confirm area</h2>

<div mat-dialog-content>
    <p>Do you want to view analytics for this area?</p>
    <p><em>This may take some time.</em></p>
</div>

<div mat-dialog-actions>
    <button mat-button mat-dialog-close="no">No</button>
    <button mat-flat-button color="primary" mat-dialog-close="yes" cdkFocusInitial>Yes</button>
</div>
