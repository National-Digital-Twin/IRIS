@let data = dataInput();
@let warn = warnInput();
@let subtitle = warn ? 'Within an area of many icing days' : undefined;
<c477-more-info-section-item
    headerInput="Icing days"
    [subtitleInput]="subtitle"
    [warnInput]="warn"
    [warningGuidanceInput]="warningGuidance"
    [downloadableWarningGuidanceMoreInfoInput]="downloadableWarningGuidanceMoreInfo"
>
    <div class="container data-table">
        <dl>
            <dt>Icing days</dt>
            <dd>{{ data.icingDays.toFixed(2) }} days</dd>
        </dl>
    </div>
</c477-more-info-section-item>
