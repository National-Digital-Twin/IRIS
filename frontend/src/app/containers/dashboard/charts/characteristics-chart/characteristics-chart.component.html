<div class="widget-header">
    <div class="widget-title">
        <span>Percentage of buildings with</span>
        <mat-form-field appearance="outline" class="inline-select">
            <mat-select
                [value]="selectedCharacteristic()"
                (selectionChange)="selectedCharacteristic.set($event.value)"
                [placeholder]="'characteristic'"
                [disabled]="loading() || !!error()"
            >
                @for (option of characteristicOptions(); track option) {
                    <mat-option [value]="option">{{ option }}</mat-option>
                }
            </mat-select>
        </mat-form-field>
        <span>per</span>
        <area-selector
            [label]="'region'"
            [singularLabel]="true"
            [selectedAreas]="selectedRegions()"
            [availableAreas]="availableRegions()"
            [disabled]="loading() || !!error()"
            (selectedAreasChange)="selectedRegions.set($event)"
        ></area-selector>
    </div>
</div>

<div class="chart-wrapper">
    @if (loading() || error()) {
        <chart-placeholder [error]="error()" [onRetry]="retry.bind(this)" />
    } @else {
        <plotly-plot [data]="chartData()" [layout]="chartLayout()" [config]="chartConfig"></plotly-plot>
    }
</div>
