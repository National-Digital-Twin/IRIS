<div class="widget-header">
    <span class="widget-title">Overall EPC</span>
</div>

@if (loading() || error()) {
    <chart-placeholder [error]="error()" [onRetry]="retry.bind(this)" />
} @else {
    <div class="overall-epc-container">
        <div class="donut-section">
            <plotly-plot [data]="donutChartData()" [layout]="donutChartLayout()" [config]="chartConfig"></plotly-plot>
        </div>
        <div class="bar-section">
            <plotly-plot
                #barPlot
                [data]="barChartData()"
                [layout]="barChartLayout()"
                [config]="chartConfig"
                [useResizeHandler]="true"
                (initialized)="onBarChartInitialized()"
            ></plotly-plot>
        </div>
    </div>
}
