<div class="widget-header">
    <div class="widget-title">
        <span>{{ chartTitle() }}</span>
        @if (!isPolygonView) {
            <area-selector
                [label]="selectorLabel()"
                [disabled]="loading() || !!error()"
                [selectedAreas]="selectedAreas()"
                [availableAreas]="availableAreas()"
                (selectedAreasChange)="selectedAreas.set($event)"
            ></area-selector>
        }
        @if (titleSuffix()) {
            <span>{{ titleSuffix() }}</span>
        }
    </div>
</div>

<div class="chart-wrapper">
    @if (loading() || error()) {
        <chart-placeholder [error]="error()" [onRetry]="retry.bind(this)" />
    } @else {
        <div class="chart-with-scrollbar" (wheel)="onChartWheel($event)">
            <plotly-plot [data]="chartData()" [layout]="chartLayout()" [config]="chartConfig"></plotly-plot>
            @if (scrollMetrics.needsScroll) {
                <div class="chart-scrollbar">
                    <chart-scrollbar [position]="scrollPosition()" [metrics]="scrollMetrics" (positionChange)="onScrollPositionChange($event)" />
                </div>
            }
        </div>
    }
</div>
