<div class="widget-header">
    <span class="widget-title">EPC ratings over time</span>
</div>

<div class="chart-wrapper">
    @if (loading() || error()) {
        <chart-placeholder [error]="error()" [onRetry]="retry.bind(this)" />
    } @else {
        <plotly-plot [data]="chartData()" [layout]="chartLayout()" [config]="chartConfig"></plotly-plot>
    }
</div>
