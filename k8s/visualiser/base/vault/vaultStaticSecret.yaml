apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: iris-visualiser-static-secret
spec:
  refreshAfter: 30s
  # path of the secret
  path: applications/iris/visualiser
  type: kv-v2
  mount: k8-cluster
  destination:
    # destination k8s secret
    name: iris-visualiser-secrets
    create: true
  vaultAuthRef: iris-visualiser-vault-auth
